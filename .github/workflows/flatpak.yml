name: Flatpak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo sources
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py \
            -o /tmp/flatpak-cargo-generator.py
          python3 -m pip install --quiet toml
          python3 /tmp/flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.example.GtkCrossPlatform.flatpak
          manifest-path: com.example.GtkCrossPlatform.json
          cache-key: flatpak-builder-${{ github.sha }}
