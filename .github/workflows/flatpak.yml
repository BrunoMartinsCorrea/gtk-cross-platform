name: Flatpak

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  flatpak:
    name: Build Flatpak
    runs-on: ubuntu-latest
    permissions:
      contents: write
    container:
      image: ghcr.io/flathub-infra/flatpak-github-actions:gnome-48
      options: --privileged

    steps:
      - uses: actions/checkout@v4

      - name: Generate Cargo sources
        run: |
          curl -sSfL \
            https://raw.githubusercontent.com/flatpak/flatpak-builder-tools/master/cargo/flatpak-cargo-generator.py \
            -o /tmp/flatpak-cargo-generator.py
          python3 -m pip install --quiet toml
          python3 /tmp/flatpak-cargo-generator.py Cargo.lock -o cargo-sources.json

      - uses: flatpak/flatpak-github-actions/flatpak-builder@v6
        with:
          bundle: com.example.GtkCrossPlatform.flatpak
          manifest-path: com.example.GtkCrossPlatform.json
          cache-key: flatpak-builder-${{ github.sha }}

      - name: Publish Nightly
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete nightly --repo ${{ github.repository }} --yes --cleanup-tag || true
          gh release create nightly \
            --repo ${{ github.repository }} \
            --title "Nightly Build" \
            --notes "Automated nightly build from commit ${{ github.sha }}" \
            --prerelease \
            com.example.GtkCrossPlatform.flatpak
